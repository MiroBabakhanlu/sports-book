<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="flex min-h-screen bg-gray-50 text-gray-800 font-sans antialiased">

    <aside class="w-64 bg-white border-r border-gray-200 flex flex-col pt-6 fixed h-full z-10">
        <div class="mb-8">
            <h4 class="px-6 text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-3">Configuration</h4>
            <ul class="space-y-1">
                <li id="leagueViewBtn"
                    class="px-6 py-2.5 text-sm font-semibold bg-teal-50 text-teal-700 border-r-4 border-teal-600 cursor-pointer transition-colors">
                    Leagues
                </li>
                <li class="px-6 py-2.5 text-sm text-gray-600 hover:bg-gray-50 cursor-pointer transition-colors">Markets
                </li>
                <li class="px-6 py-2.5 text-sm text-gray-600 hover:bg-gray-50 cursor-pointer transition-colors">Streak
                    rules</li>
                <li id="bookmakerViewBtn"
                    class="px-6 py-2.5 text-sm text-gray-600 hover:bg-gray-50 cursor-pointer transition-colors">
                    Bookmakers
                </li>
                <li class="px-6 py-2.5 text-sm text-gray-600 hover:bg-gray-50 cursor-pointer transition-colors">Banners
                </li>
            </ul>
        </div>
        <div>
            <h4 class="px-6 text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-3">System</h4>
            <ul class="space-y-1">
                <li class="px-6 py-2.5 text-sm text-gray-600 hover:bg-gray-50 cursor-pointer transition-colors">Users &
                    roles</li>
                <li class="px-6 py-2.5 text-sm text-gray-600 hover:bg-gray-50 cursor-pointer transition-colors">Data
                    sources</li>
                <li class="px-6 py-2.5 text-sm text-gray-600 hover:bg-gray-50 cursor-pointer transition-colors">
                    Notifications</li>
                <a href="./stats.html"
                    class="px-6 py-2.5 text-sm text-gray-600 hover:bg-gray-50 cursor-pointer transition-colors"
                    id="switch-stats-page">
                    STATS</a>
            </ul>
        </div>
    </aside>

    <main id="mainView" class="flex-1 ml-64 p-8 lg:p-10 max-w-7xl">

        <div id="league-config-container" class="space-y-8">

            <div class="flex justify-between items-start">
                <div>
                    <h1 class="text-2xl font-bold text-gray-900 mb-1">League configuration</h1>
                    <!-- <p class="text-sm text-gray-500">Manage which leagues appear on the site, their display order, and
                        season status</p> -->
                </div>
                <!-- <button
                    class="bg-white border border-gray-200 text-gray-700 hover:bg-gray-50 px-4 py-2 rounded-lg text-sm font-medium shadow-sm transition-colors">
                    Add league
                </button> -->
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4" id="league-summery-container">
                <div class="bg-white p-5 rounded-xl border border-gray-200 shadow-sm flex flex-col justify-center">
                    <h2 class="text-3xl font-bold text-teal-600 mb-1" id="active-count">0</h2>
                    <p class="text-xs text-gray-500 uppercase tracking-wider">Active leagues</p>
                </div>
                <div class="bg-white p-5 rounded-xl border border-gray-200 shadow-sm flex flex-col justify-center">
                    <h2 class="text-3xl font-bold text-gray-400 mb-1" id="inactive-count">0</h2>
                    <p class="text-xs text-gray-500 uppercase tracking-wider">Inactive / hidden</p>
                </div>
                <div class="bg-white p-5 rounded-xl border border-gray-200 shadow-sm flex flex-col justify-center">
                    <h2 class="text-3xl font-bold text-gray-800 mb-1" id="total-count">0</h2>
                    <p class="text-xs text-gray-500 uppercase tracking-wider">Total leagues</p>
                </div>
            </div>

            <div class="flex flex-wrap items-center gap-4">
                <input type="text" id="league-search-input" placeholder="Search leagues..."
                    class="px-4 py-2 border border-gray-200 rounded-lg text-sm w-64 focus:outline-none focus:ring-2 focus:ring-teal-600 focus:border-transparent">

                <div class="flex rounded-lg border border-gray-200 overflow-hidden shadow-sm" id="filter-container">
                    <button id="filter-all"
                        class="px-4 py-2 bg-teal-50 text-teal-700 text-sm font-medium border-r border-gray-200">All</button>
                    <button id="filter-active"
                        class="px-4 py-2 bg-white text-gray-600 text-sm hover:bg-gray-50 border-r border-gray-200 transition-colors">Active</button>
                    <button id="filter-inactive"
                        class="px-4 py-2 bg-white text-gray-600 text-sm hover:bg-gray-50 border-r border-gray-200 transition-colors">Inactive</button>
                    <button id="filter-included"
                        class="px-4 py-2 bg-white text-gray-600 text-sm hover:bg-gray-50 border-r border-gray-200 transition-colors">Included</button>
                    <button id="filter-excluded"
                        class="px-4 py-2 bg-white text-gray-600 text-sm hover:bg-gray-50 border-r border-gray-200 transition-colors">Not
                        Included</button>
                </div>

                <!-- <span class="ml-auto text-xs text-gray-400 italic">Drag rows to reorder</span> -->
            </div>

            <div>
                <h3 class="text-[11px] font-bold text-gray-400 tracking-wider mb-3 uppercase">Pinned to top of sidebar
                </h3>
                <div id="league-byorder-container"
                    class="bg-white border border-gray-200 rounded-xl overflow-hidden shadow-sm flex flex-col">
                </div>
            </div>
        </div>

        <div id="bookmaker-config-container" class="hidden">
            <h1 class="text-2xl font-bold text-gray-900 mb-1">Bookmaker Configuration</h1>
        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script src="./js/admin.js"></script>
</body>

</html>
